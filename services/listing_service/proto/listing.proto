syntax = "proto3";
package listing;
option go_package = "./listing";

service listingService {
  // Функция принимает ID квартиры и возвращает ее данные
  rpc GetListingInfo (ListingRequest) returns (ListingResponse);
}

message ListingRequest { string id = 1; }
message ListingResponse {
  string id = 1;
  double price = 2;
  bool is_available = 3;
}